\* TLC configuration for Rlb.tla — mechanical verification of Theorem 1
\* (the tight recovery latency bound L <= peak + W - 1).

SPECIFICATION Spec

\* Bounded constants. W = 4 keeps the state space tractable while
\* exercising all four phases of Theorem 1's proof (accumulation,
\* saturation, flush, recovery). MAX_DRIFT = 4 = W bounds the
\* transient-drift hypothesis N <= W; for N > W the bound peak + W - 1
\* does not hold and Theorem 1 does not apply (see paper §6.3
\* Corollary 1).
CONSTANTS
    W = 4
    MAX_DRIFT = 4

\* Three invariants:
\* - INV_RLB: the formal statement of Theorem 1.
\* - INV_PEAK_BOUNDED: structural sanity on the verifier-state peak.
\* - INV_WINDOW_BOUND: structural sanity on the sliding window itself.
INVARIANTS
    INV_RLB
    INV_PEAK_BOUNDED
    INV_WINDOW_BOUND
