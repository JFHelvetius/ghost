\* TLC sweep configuration for Rlb.tla at W = 16 (ADR-0038, paper §6.3).
\*
\* Part of the parametric sweep {W = 4, 8, 16} that v0.2.5 ships as
\* empirical evidence the bounded TLC proof generalises across
\* structurally distinct W. See `Rlb_unbounded_handproof.md` for the
\* mathematical (unbounded) proof and `Rlb_unbounded.tla` for the
\* TLAPS outline.
\*
\* MAX_DRIFT = W keeps the transient-drift hypothesis N <= W
\* saturated. At W = 16 the state space is ~16x the W = 4 baseline;
\* still tractable on a single core and gives a 16x larger window
\* than the original bounded proof.

SPECIFICATION Spec

CONSTANTS
    W = 16
    MAX_DRIFT = 16

INVARIANTS
    INV_RLB
    INV_PEAK_BOUNDED
    INV_WINDOW_BOUND
