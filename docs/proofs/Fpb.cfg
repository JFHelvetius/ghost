\* TLC configuration for Fpb.tla — mechanical verification of the
\* structural well-formedness of the FPB-v1 counter automaton
\* (ADR-0035, paper §3.5).

SPECIFICATION Spec

\* The state machine deliberately reaches a terminal state when
\* cycles_total = MAX_CYCLES (no more cycles to observe under the
\* bound). TLC reports this as a deadlock by default; disable the
\* deadlock check since the terminal state is the intended completion.
CHECK_DEADLOCK FALSE

\* Bounded constants:
\*   MAX_CYCLES = 8 keeps the state space tractable while exercising
\*     the counter through fire / non-fire alternations.
\*   MAX_FIRE_NUMER = 1, BOUND_DENOM = 1 encode the default
\*     observational threshold max_fire_fraction = 1.0; the bound
\*     reads "cycles_fires * 1 <= 1 * cycles_total" which is the
\*     INV_FPB_RATIO_BOUNDED restatement. This makes the three
\*     invariants exhaustively check the verifier's
\*     "always-holds-as-observer" contract.
CONSTANTS
    MAX_CYCLES = 8
    MAX_FIRE_NUMER = 1
    BOUND_DENOM = 1

\* Three invariants:
\* - INV_FPB_RATIO_BOUNDED: structural well-formedness of the
\*   counter (cycles_fires <= cycles_total always).
\* - INV_FPB_FIRE_IMPLIES_TOTAL: equivalent restatement.
\* - INV_FPB_OBSERVATIONAL_DEFAULT: under the default observational
\*   threshold, the bound holds in every reachable state.
INVARIANTS
    INV_FPB_RATIO_BOUNDED
    INV_FPB_FIRE_IMPLIES_TOTAL
    INV_FPB_OBSERVATIONAL_DEFAULT
