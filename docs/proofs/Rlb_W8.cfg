\* TLC sweep configuration for Rlb.tla at W = 8 (ADR-0038, paper §6.3).
\*
\* Part of the parametric sweep {W = 4, 8, 16} that v0.2.5 ships as
\* empirical evidence the bounded TLC proof generalises across
\* structurally distinct W. See `Rlb_unbounded_handproof.md` for the
\* mathematical (unbounded) proof and `Rlb_unbounded.tla` for the
\* TLAPS outline.
\*
\* MAX_DRIFT = W keeps the transient-drift hypothesis N <= W
\* saturated, exercising the full proof phase tree at this scale.

