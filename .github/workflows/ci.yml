name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Forward-compatibility: GitHub Actions deprecates Node.js 20 on
# 2026-06-16. Opt in to Node 24 now so the currently-pinned actions
# (checkout, setup-python, upload-artifact) run on the new runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,telemetry]"
      - name: Ruff
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: MyPy
        run: mypy
      - name: Deptry
        run: deptry src
      - name: No global random
        run: python scripts/check_no_global_random.py

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sim,telemetry,dev]"
      - name: Unit tests
        run: pytest -m "not slow and not scenario" --cov=project_ghost --cov-report=xml
      - name: Conformance tests
        run: pytest -m conformance
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  verify-properties:
    # ADR-0031..0035 self-enforcement: every push must produce a smoke
    # MCAP whose five formal safety properties hold under
    # ``ghost verify-properties``. The job runs after tests pass and
    # treats a property violation as a CI failure — making the README
    # claim "all five properties hold byte-exact" a continuously
    # verified fact rather than a local-only assertion.
    name: Verify safety property set (ADR-0031..0035)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # ---- Sustained-drift smoke ---------------------------------
      - name: Run sustained-drift smoke
        run: python -m project_ghost.examples.closed_loop_smoke
      - name: Verify properties (sustained-drift)
        run: ghost verify-properties --mcap closed_loop_smoke.mcap
      - name: Verify properties (sustained-drift, JSON)
        run: |
          ghost verify-properties \
            --mcap closed_loop_smoke.mcap --json \
            > property_report_drift.json
          cat property_report_drift.json

      # ---- Drift-then-recovery smoke -----------------------------
      # The sustained-drift scenario leaves RLB-v1 vacuously satisfied
      # (no recovery transitions). This second smoke is engineered to
      # fire exactly one recovery transition with L = peak + W - 1,
      # giving RLB a strong witness in CI rather than only in the
      # Hypothesis property test. ADR-0034 §4.4.
      - name: Run drift-then-recovery smoke
        run: python -m project_ghost.examples.closed_loop_smoke_with_recovery
      - name: Verify properties (drift-then-recovery)
        run: ghost verify-properties --mcap closed_loop_smoke_with_recovery.mcap
      - name: Verify properties (drift-then-recovery, JSON)
        run: |
          ghost verify-properties \
            --mcap closed_loop_smoke_with_recovery.mcap --json \
            > property_report_recovery.json
          cat property_report_recovery.json

      - name: Upload property reports
        uses: actions/upload-artifact@v4
        with:
          name: property-reports
          path: |
            property_report_drift.json
            property_report_recovery.json
      - name: Upload reference MCAPs
        uses: actions/upload-artifact@v4
        with:
          name: reference-mcaps
          path: |
            closed_loop_smoke.mcap
            closed_loop_smoke_with_recovery.mcap

  tla-plus:
    # ADR-0036 self-enforcement: every push must keep the TLA+
    # specification's invariants satisfiable. TLC enumerates the full
    # reachable state space (bounded by M=2, K=1, W=3) and asserts
    # INV_BAUD, INV_ERUR, INV_PARTITION, INV_NO_INVENTED_CONFIDENCE
    # and INV_HISTORY_BOUND all hold. Any violation indicates a bug
    # in the spec, the policy encoding, or the property statements
    # themselves — release-blocking.
    name: TLA+ mechanical verification (ADR-0036)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache tla2tools.jar
        id: cache-tla
        uses: actions/cache@v4
        with:
          path: tla2tools.jar
          key: tla2tools-jar-v1.8.0
      - name: Download tla2tools.jar
        if: steps.cache-tla.outputs.cache-hit != 'true'
        run: |
          curl -L -o tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
      - name: Run TLC on BaudErur spec
        run: |
          cd docs/proofs
          java -cp ../../tla2tools.jar tlc2.TLC \
            -config BaudErur.cfg \
            BaudErur.tla \
            | tee tlc_output.log
          # TLC exits 0 on success. Grep is belt-and-braces:
          grep -q "Model checking completed. No error has been found" \
            docs/proofs/tlc_output.log || \
            grep -q "Model checking completed. No error has been found" \
            tlc_output.log
      - name: Upload TLC output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tlc-output
          path: docs/proofs/tlc_output.log
