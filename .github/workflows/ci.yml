name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Forward-compatibility: GitHub Actions deprecates Node.js 20 on
# 2026-06-16. Opt in to Node 24 now so the currently-pinned actions
# (checkout, setup-python, upload-artifact) run on the new runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,telemetry]"
      - name: Ruff
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: MyPy
        run: mypy
      - name: Deptry
        run: deptry src
      - name: No global random
        run: python scripts/check_no_global_random.py

  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[sim,telemetry,dev]"
      - name: Unit tests
        run: pytest -m "not slow and not scenario" --cov=project_ghost --cov-report=xml
      - name: Conformance tests
        shell: bash
        run: |
          # pytest exits 5 ("no tests collected") when the conformance
          # marker matches nothing. The marker is reserved for HAL
          # backend conformance suites that will be added per-backend;
          # treat empty selection as success so the step is
          # forward-compatible without falsely failing the build today.
          set +e
          pytest -m conformance
          rc=$?
          set -e
          if [ "$rc" = "5" ]; then
            echo "::notice::No tests matched the 'conformance' marker (reserved for HAL backends)."
            exit 0
          fi
          exit "$rc"
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  verify-properties:
    # ADR-0031..0035 self-enforcement: every push must produce a smoke
    # MCAP whose five formal safety properties hold under
    # ``ghost verify-properties``. The job runs after tests pass and
    # treats a property violation as a CI failure — making the README
    # claim "all five properties hold byte-exact" a continuously
    # verified fact rather than a local-only assertion.
    name: Verify safety property set (ADR-0031..0035)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # ---- Sustained-drift smoke ---------------------------------
      - name: Run sustained-drift smoke
        run: python -m project_ghost.examples.closed_loop_smoke
      - name: Verify properties (sustained-drift)
        run: ghost verify-properties --mcap closed_loop_smoke.mcap
      - name: Verify properties (sustained-drift, JSON)
        run: |
          ghost verify-properties \
            --mcap closed_loop_smoke.mcap --json \
            > property_report_drift.json
          cat property_report_drift.json

      # ---- Drift-then-recovery smoke -----------------------------
      # The sustained-drift scenario leaves RLB-v1 vacuously satisfied
      # (no recovery transitions). This second smoke is engineered to
      # fire exactly one recovery transition with L = peak + W - 1,
      # giving RLB a strong witness in CI rather than only in the
      # Hypothesis property test. ADR-0034 §4.4.
      - name: Run drift-then-recovery smoke
        run: python -m project_ghost.examples.closed_loop_smoke_with_recovery
      - name: Verify properties (drift-then-recovery)
        run: ghost verify-properties --mcap closed_loop_smoke_with_recovery.mcap
      - name: Verify properties (drift-then-recovery, JSON)
        run: |
          ghost verify-properties \
            --mcap closed_loop_smoke_with_recovery.mcap --json \
            > property_report_recovery.json
          cat property_report_recovery.json

      - name: Upload property reports
        uses: actions/upload-artifact@v4
        with:
          name: property-reports
          path: |
            property_report_drift.json
            property_report_recovery.json
      - name: Upload reference MCAPs
        uses: actions/upload-artifact@v4
        with:
          name: reference-mcaps
          path: |
            closed_loop_smoke.mcap
            closed_loop_smoke_with_recovery.mcap

  determinism-cross-machine:
    # Paper §8.4 self-enforcement: the reference smoke must produce
    # byte-identical MCAPs and property-report JSON across Linux and
    # Windows runners. This job runs the smoke + verifier on a matrix
    # and uploads a single-line SHA-256 + JSON SHA-256 per runner;
    # the aggregator step downloads both artifacts and asserts equality.
    # If the assertion ever fires, some non-determinism leaked into
    # either the pipeline (smoke MCAP) or the verifier (report JSON).
    name: Cross-machine determinism (paper §8.4)
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Smoke + verify + hash
        shell: bash
        run: |
          python -m project_ghost.examples.closed_loop_smoke
          # Normalise the JSON output before hashing: parse, drop
          # platform-dependent fields (mcap_path; path separators differ
          # between Linux / Windows), and re-serialise canonically.
          ghost verify-properties \
            --mcap closed_loop_smoke.mcap --json \
            > property_report_raw.json
          python -c "
          import hashlib, json, sys
          mcap_sha = hashlib.sha256(open('closed_loop_smoke.mcap','rb').read()).hexdigest()
          report = json.load(open('property_report_raw.json'))
          report.pop('mcap_path', None)
          canonical = json.dumps(report, sort_keys=True, separators=(',', ':'))
          report_sha = hashlib.sha256(canonical.encode('utf-8')).hexdigest()
          with open('determinism_${{ matrix.os }}.txt', 'w', newline='\n') as f:
              f.write(f'MCAP {mcap_sha}\nREPORT {report_sha}\n')
          "
          cat determinism_${{ matrix.os }}.txt
      - name: Upload determinism hash
        uses: actions/upload-artifact@v4
        with:
          name: determinism-${{ matrix.os }}
          path: determinism_${{ matrix.os }}.txt

  determinism-cross-machine-assert:
    # Downloads both runners' hash files and asserts byte-equality of
    # the MCAP and JSON SHA-256 across Linux and Windows.
    name: Cross-machine determinism assert (paper §8.4)
    needs: determinism-cross-machine
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux hash
        uses: actions/download-artifact@v4
        with:
          name: determinism-ubuntu-latest
          path: linux/
      - name: Download Windows hash
        uses: actions/download-artifact@v4
        with:
          name: determinism-windows-latest
          path: windows/
      - name: Assert byte-equality
        run: |
          set -eo pipefail
          echo "== Linux =="
          cat linux/determinism_ubuntu-latest.txt
          echo "== Windows =="
          cat windows/determinism_windows-latest.txt
          diff linux/determinism_ubuntu-latest.txt windows/determinism_windows-latest.txt
          echo "::notice::Smoke MCAP and property-report JSON are byte-identical across Linux and Windows runners."

  tla-plus:
    # ADR-0036 + paper §6 self-enforcement: every push must keep both
    # TLA+ specifications' invariants satisfiable. TLC enumerates the
    # full reachable state space and asserts every invariant. Any
    # violation indicates a bug in the spec, the policy encoding, or
    # the property statements themselves — release-blocking.
    #
    # BaudErur.tla (M=2, K=1, W=3): INV_BAUD, INV_ERUR, INV_PARTITION,
    #   INV_NO_INVENTED_CONFIDENCE, INV_HISTORY_BOUND.
    # Rlb.tla (W=4, MAX_DIRTY_RUN=12): INV_RLB (Theorem 1),
    #   INV_PEAK_BOUNDED, INV_WINDOW_BOUND.
    name: TLA+ mechanical verification (ADR-0036 + paper §6)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache tla2tools.jar
        id: cache-tla
        uses: actions/cache@v4
        with:
          path: tla2tools.jar
          key: tla2tools-jar-v1.8.0
      - name: Download tla2tools.jar
        if: steps.cache-tla.outputs.cache-hit != 'true'
        run: |
          curl -L -o tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
      - name: Run TLC on BaudErur spec
        working-directory: docs/proofs
        run: |
          # Capture both stdout and stderr; TLC mixes them.
          # GitHub Actions runs bash with `set -eo pipefail` so any
          # non-zero exit from java OR a broken pipe fails this step.
          java -cp ../../tla2tools.jar tlc2.TLC \
            -config BaudErur.cfg \
            BaudErur.tla 2>&1 | tee tlc_output_baud_erur.log
          # Belt-and-braces success check: TLC exit code already gated
          # by pipefail, this just asserts the canonical success
          # signature is in the log we are about to archive.
          grep -q "Model checking completed" tlc_output_baud_erur.log
      - name: Run TLC on Rlb spec (Theorem 1)
        working-directory: docs/proofs
        run: |
          java -cp ../../tla2tools.jar tlc2.TLC \
            -config Rlb.cfg \
            Rlb.tla 2>&1 | tee tlc_output_rlb.log
          grep -q "Model checking completed" tlc_output_rlb.log
      - name: Upload TLC output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tlc-output
          path: |
            docs/proofs/tlc_output_baud_erur.log
            docs/proofs/tlc_output_rlb.log
