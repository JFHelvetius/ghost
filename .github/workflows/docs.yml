name: Deploy docs site

# Builds the MkDocs Material site and publishes to GitHub Pages on
# every push to main. The site at https://JFHelvetius.github.io/ghost/
# is the third citation surface alongside PyPI and the git tag.
#
# One-time setup required (maintainer-only):
#   1. Repo Settings → Pages → Source: "GitHub Actions"
#   2. Push to main → workflow auto-publishes

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs>=1.6 \
            mkdocs-material>=9.5 \
            pymdown-extensions>=10.0
      - name: Build
        run: mkdocs build --strict
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
