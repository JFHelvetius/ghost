name: Deploy docs site

# Builds the MkDocs Material site and publishes to GitHub Pages on
# every push to main. The site at https://JFHelvetius.github.io/ghost/
# is the third citation surface alongside PyPI and the git tag.
#
# One-time setup required (maintainer-only):
#   1. Repo Settings → Pages → Source: "GitHub Actions"
#   2. Push to main → workflow auto-publishes

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# Forward-compatibility: GitHub Actions deprecates Node.js 20 on
# 2026-06-16. Opt in to Node 24 now.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MkDocs + Material
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs>=1.6 \
            mkdocs-material>=9.5 \
            pymdown-extensions>=10.0
      - name: Build
        # NOTE: --strict was previously enabled but rejects every relative
        # link that paper/*.md emits to repo-root paths (e.g.
        # src/project_ghost/.../foo.py). Those links are intentional --
        # the markdown is *primarily* read on github.com, where the link
        # resolves; mkdocs cannot resolve them because it only sees the
        # docs/ subtree. Rewriting 40+ such links to be both
        # github-friendly and mkdocs-resolvable would be net-negative for
        # the GitHub reader (the dominant audience). Building without
        # --strict emits warnings but still ships the site; broken cross-
        # site navigation surfaces in the artifact for manual review.
        run: mkdocs build
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
